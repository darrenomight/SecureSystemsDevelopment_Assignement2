name: Build the project
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repo
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build the code
        run: |
          sudo apt install -y build-essential python-is-python3 python3-pytest
          make
      - name: Run main
        run: ./main
      - name: Run tests
        run: pytest test_rijndael.py -v